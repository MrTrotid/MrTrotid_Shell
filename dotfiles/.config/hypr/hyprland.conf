# Hyprland Config for Trotid Shell
# Scrolling Layout + Quickshell Integration

source = ./keybinds.conf
source = ./windowrules.conf

monitor = , preferred, auto, 1

general {
    layout = scrolling
    gaps_in = 8
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(7c7cffFF)
    col.inactive_border = rgba(505050FF)
    allow_tearing = false
}

plugin {
    hyprscrolling {
        column_width = 0.5
        explicit_column_widths = 0.333, 0.5, 0.667, 1.0
        follow_focus = true
    }
}

input {
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

animations {
    enabled = true
    bezier = easeOutCubic, 0.33, 1, 0.68, 1
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    animation = windows, 1, 1, easeOutCubic, popin 80%
    animation = windowsOut, 1, 1, easeOutCubic, popin 80%
    animation = fade, 1, 1, easeOutCubic
    animation = workspaces, 1, 1, easeOutCubic, slide
    animation = layers, 1, 1, easeOutCubic, fade
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 12
        passes = 4
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        offset = 0 4
        color = rgba(1a1a2e66)
    }
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    allow_session_lock_restore = 1
}

# Start Quickshell (Dashboard, sidebars, panels — bar included)
exec-once = quickshell -c /home/mrtrotid-ssd/Desktop/Trotid_Shell/quickshell/
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Optional daemons (commented out — packages not installed)
# exec-once = hypridle       # requires hypridle AUR package
# exec-once = hyprsunset     # requires hyprsunset AUR package
# exec-once = hyprpolkitagent  # requires hyprpolkitagent AUR package
# exec-once = easyeffects --hide-window --service-mode
# exec-once = gnome-keyring-daemon --start --components=secrets

# Audio service (wpctl works without easyeffects)
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Layer Rules (Waybar) ───────────────────────────────────────────────
layerrule = blur on,        match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
