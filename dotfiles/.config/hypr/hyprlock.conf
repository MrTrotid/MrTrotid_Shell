$font = JetBrainsMono Nerd Font
$accent = rgb(81D5CA)
$accent_dim = rgba(81D5CA, 0.3)
$text = rgb(DDE4E2)
$text_dim = rgba(DDE4E2, 0.5)

general {
  hide_cursor = true
  no_fade_in = false
  no_fade_out = false
  grace = 0
  disable_loading_bar = false
  fractional_scaling = 1
}

background {
  monitor =
  path = ~/.cache/quickshell/wallpaper_picker/current_wallpaper.png
  blur_passes = 4
  blur_size = 6
  brightness = 0.55
  contrast = 1.0
  vibrancy = 0.15
  vibrancy_darkness = 0.4
}

# ── Clock (bottom left) ──────────────────────────────────────────
label {
  monitor =
  text = $TIME
  color = $accent
  font_size = 86
  font_family = $font
  position = 80, 80
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:30000] date +"%A, %d %B"
  color = $text_dim
  font_size = 18
  font_family = $font
  position = 82, 30
  halign = left
  valign = bottom
}

# ── Password (bottom right) ──────────────────────────────────────
input-field {
  monitor =
  size = 300, 50
  outline_thickness = 0
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(00000000)
  inner_color = rgba(00000000)
  font_color = $text
  fade_on_empty = false
  placeholder_text =   Enter password
  hide_input = false
  check_color = $accent
  fail_color = rgb(FFB4AB)
  fail_text = $ATTEMPTS
  capslock_color = $accent
  position = -5, 5
  halign = right
  valign = bottom
  rounding = 0
}
