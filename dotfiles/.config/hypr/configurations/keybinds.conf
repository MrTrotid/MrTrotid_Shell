# ╔══════════════════════════════════════════════════════════════════╗
# ║              TROTID SHELL — HYPRLAND KEYBINDS                  ║
# ║         All keybinds in one file for cheatsheet generation     ║
# ╚══════════════════════════════════════════════════════════════════╝

# === Shell: Panel toggles (Quickshell global IPC) ==================
bind = SUPER, A, global, quickshell:notificationPanelToggle
bind = SUPER, O, global, quickshell:barToggle
bind = SUPER, M, global, quickshell:mediaControlsToggle
# —— Reserved (blank for now) ——————————————————————————————————————
# bind = SUPER, N, global, quickshell:
bind = SUPER, J, global, quickshell:quickActionsToggle
# bind = SUPER, K, global, quickshell:
# bind = SUPER, B, global, quickshell:

# —— Night Light (hyprsunset toggle) ——————————————————————————————
bind = SUPER SHIFT, N, exec, if pgrep -x hyprsunset > /dev/null; then pkill hyprsunset; else hyprsunset -t 3200; fi

# —— Wallpaper selector ——————————————————————————————————————————————
bind = CTRL SUPER, T, global, quickshell:wallpaperToggle

# —— Shell Toggles ———————————————————————————————————————————————————
bind = SUPER, V, global, quickshell:clipboardToggle
bind = SUPER, period, global, quickshell:emojiToggle
bind = SUPER, comma, global, quickshell:gifToggle
bind = SUPER, slash, global, quickshell:cheatsheetToggle

# === Apps ===========================================================
bind = SUPER, Return, exec, ghostty
bind = SUPER, Space, exec, bash ~/.config/rofi/launchers/type-1/launcher.sh
bind = SUPER, W, exec, zen-browser
bind = SUPER SHIFT, W, exec, brave-browser
bind = SUPER, E, exec, thunar
bind = SUPER, C, exec, nvim

# === Window: Focus ==================================================
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# === Window: Move ===================================================
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# === Window: Close / Float / Fullscreen =============================
bind = SUPER, Q, killactive,
bind = SUPER, G, togglefloating,
bind = SUPER, P, pin, 1
bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, F, fullscreen, 1

# === Window: Mouse resize / move ====================================
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# === Workspace: Switch by number ====================================
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# === Workspace: Move window to number ==============================
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# === Workspace: Cycle (scrolling) ===================================
bind = SUPER, Tab, exec, qs ipc -c overview call overview toggle
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, equal, workspace, e+1
bind = SUPER, minus, workspace, e-1
bind = CTRL SUPER, left, movetoworkspace, r-1
bind = CTRL SUPER, right, movetoworkspace, r+1

# === Special: Scratchpad ============================================
bind = SUPER, S, togglespecialworkspace, special
bind = CTRL SUPER, S, togglespecialworkspace, special
bind = SUPER ALT, S, movetoworkspace, special

# === Session ========================================================
bind = SUPER SHIFT, P, exec, loginctl lock-session
bind = SUPER SHIFT, L, exec, systemctl suspend || loginctl suspend
bind = CTRL SHIFT ALT SUPER, Delete, exec, systemctl poweroff || loginctl poweroff
bind = CTRL SHIFT ALT SUPER, End, exec, systemctl reboot || loginctl reboot

# === Screenshots =====================================================
bind = , Print, exec, bash ~/.config/scripts/screenshots/screenshot.sh full
bind = CTRL, Print, exec, bash ~/.config/scripts/screenshots/screenshot.sh region
bind = SHIFT, Print, exec, bash ~/.config/scripts/screenshots/screenshot.sh window
bind = ALT, Print, exec, bash ~/.config/scripts/screenshots/screenshot.sh monitor
bind = CTRL SHIFT, Print, exec, bash ~/.config/scripts/screenshots/screenshot.sh annotate
bind = SUPER SHIFT, C, exec, hyprpicker -a

# === Screen Recording ================================================
bind = CTRL ALT, R, exec, bash ~/.config/scripts/recording/recording.sh full
bind = CTRL SHIFT, R, exec, bash ~/.config/scripts/recording/recording.sh region

# === Brightness / Volume ============================================
bindl = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

# === Media keys (hardware) ==========================================
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# === Shell: Restart =================================================
bind = CTRL SUPER, R, exec, pkill -x qs 2>/dev/null; pkill -x quickshell 2>/dev/null; quickshell -c mrtrotid-shell &

