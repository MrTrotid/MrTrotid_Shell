# Window Rules for Trotid Shell

# Float certain windows
windowrule {
    name = float-pavucontrol
    match:class = ^pavucontrol$
    float = true
    size = 800 600
    center = true
}

windowrule {
    name = float-nm-editor
    match:class = ^nm-connection-editor$
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = float-blueman
    match:class = ^blueman-manager$
    float = true
    size = 600 400
    center = true
}

windowrule {
    name = float-file-roller
    match:class = ^file-roller$
    float = true
}

windowrule {
    name = float-pip
    match:title = ^Picture-in-Picture$
    float = true
}

windowrule {
    name = float-open-file
    match:title = ^Open File$
    float = true
}

windowrule {
    name = float-save-file
    match:title = ^Save File$
    float = true
}

# Opacity rules
windowrule {
    name = opacity-kitty
    match:class = ^kitty$
    opacity = 0.95 0.90
}

windowrule {
    name = opacity-code
    match:class = ^code$
    opacity = 0.95 0.90
}

windowrule {
    name = opacity-firefox
    match:class = ^firefox$
    opacity = 0.95 0.90
}

# Layer rules for Quickshell
layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0.1, match:namespace quickshell
layerrule = no_anim on, match:namespace quickshell
